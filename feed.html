<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента активности — Кибер-арена</title>
    <style>
        /* ============================================ */
/* CSS для Ленты активности - СВЕТЛЫЙ СТИЛЬ */
/* ============================================ */

/* -------------------------------------------- */
/* Импорт шрифтов */
/* -------------------------------------------- */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* -------------------------------------------- */
/* Глобальные переменные - СВЕТЛАЯ ТЕМА */
/* -------------------------------------------- */
:root {
    /* Основные цвета - белый/серый как на фото */
    --bg-primary: #F8FAFE;           /* Светло-серый фон страницы */
    --bg-container: #FFFFFF;          /* Чисто белый для контейнера */
    --bg-card: #FFFFFF;               /* Белый для карточек */
    --bg-hover: #F5F7FC;              /* Ховер на карточках */
    --border-light: #E8EDF5;          /* Светло-серая обводка */
    --border-hover: #D0D9E8;          /* Обводка при ховере */
    
    /* Текст */
    --text-primary: #1A1F2E;           /* Темно-синий/серый для заголовков */
    --text-secondary: #4F5A6F;         /* Серый для второстепенного */
    --text-muted: #7E8AA3;             /* Светло-серый для времени */
    
    /* Акцентные цвета (оставляем минимум) */
    --accent-blue: #3366FF;            /* Синий для кнопок и акцентов */
    --accent-blue-light: #EBF0FF;      /* Очень светлый синий для фона */
    
    /* Цвета для типов событий (светлые версии) */
    --event-booking: #3366FF;           /* Синий */
    --event-achievement: #FFB800;       /* Золотой */
    --event-team: #8C6EFF;              /* Фиолетовый */
    --event-tournament: #FF5C5C;         /* Красный */
    
    /* Тени */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06);
}

/* -------------------------------------------- */
/* Базовые стили */
/* -------------------------------------------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 30px 20px;
}

/* -------------------------------------------- */
/* Контейнер ленты - белый с тенью */
/* -------------------------------------------- */
.feed-container {
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    background: var(--bg-container);
    border-radius: 24px;
    border: 1px solid var(--border-light);
    overflow: hidden;
    box-shadow: var(--shadow-md);
}

/* -------------------------------------------- */
/* Шапка */
/* -------------------------------------------- */
.feed-header {
    padding: 24px 28px;
    background: var(--bg-container);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
}

.feed-title {
    display: flex;
    align-items: center;
    gap: 12px;
}

.feed-title h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin: 0;
}

/* Бейдж LIVE */
.live-badge {
    background: var(--accent-blue-light);
    border: 1px solid var(--accent-blue);
    color: var(--accent-blue);
    padding: 4px 14px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.live-badge::before {
    content: "";
    width: 8px;
    height: 8px;
    background: var(--accent-blue);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* -------------------------------------------- */
/* Фильтры - стиль как на фото */
/* -------------------------------------------- */
.feed-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.filter-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    padding: 8px 18px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
}

.filter-btn:hover {
    background: var(--bg-hover);
    border-color: var(--border-hover);
    color: var(--text-primary);
}

.filter-btn.active {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: white;
}

/* -------------------------------------------- */
/* Поиск */
/* -------------------------------------------- */
.search-box {
    padding: 0 28px 20px 28px;
}

.search-input {
    width: 100%;
    padding: 14px 20px;
    background: var(--bg-hover);
    border: 1px solid var(--border-light);
    border-radius: 40px;
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s ease;
}

.search-input:focus {
    outline: none;
    border-color: var(--accent-blue);
    background: white;
    box-shadow: 0 0 0 3px rgba(51, 102, 255, 0.08);
}

.search-input::placeholder {
    color: var(--text-muted);
}

/* -------------------------------------------- */
/* Контент ленты */
/* -------------------------------------------- */
.feed-content {
    padding: 0 28px 28px 28px;
}

/* -------------------------------------------- */
/* Карточка события - белая с серой обводкой */
/* -------------------------------------------- */
.event-card {
    display: flex;
    gap: 18px;
    padding: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    margin-bottom: 12px;
    transition: all 0.2s ease;
    position: relative;
    box-shadow: var(--shadow-sm);
}

.event-card:hover {
    background: var(--bg-hover);
    border-color: var(--border-hover);
    box-shadow: var(--shadow-md);
}

/* Тонкая линия-индикатор слева */
.event-card::before {
    content: "";
    position: absolute;
    left: -1px;
    top: 20px;
    bottom: 20px;
    width: 3px;
    background: var(--event-color, var(--border-light));
    border-radius: 0 3px 3px 0;
}

.event-card[data-type="booking"] { --event-color: var(--event-booking); }
.event-card[data-type="achievement"] { --event-color: var(--event-achievement); }
.event-card[data-type="team"] { --event-color: var(--event-team); }
.event-card[data-type="tournament"] { --event-color: var(--event-tournament); }

/* -------------------------------------------- */
/* Аватар */
/* -------------------------------------------- */
.event-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg-hover);
    border: 2px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
}

.event-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* -------------------------------------------- */
/* Контент события */
/* -------------------------------------------- */
.event-content {
    flex: 1;
}

.event-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    flex-wrap: wrap;
    gap: 10px;
}

.event-user {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.username {
    color: var(--text-primary);
    font-weight: 600;
    font-size: 16px;
}

.username:hover {
    color: var(--accent-blue);
    cursor: pointer;
}

/* Бейдж пользователя */
.badge {
    background: var(--bg-hover);
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    padding: 2px 10px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.02em;
}

/* Время события */
.event-time {
    color: var(--text-muted);
    font-size: 13px;
    display: flex;
    align-items: center;
}

.event-time::before {
    content: "•";
    margin-right: 6px;
    font-size: 14px;
    color: var(--border-light);
}

/* Текст сообщения */
.event-message {
    color: var(--text-secondary);
    font-size: 15px;
    line-height: 1.5;
    margin-bottom: 10px;
}

.event-message strong {
    color: var(--text-primary);
    font-weight: 600;
}

/* -------------------------------------------- */
/* Метаданные (теги) */
/* -------------------------------------------- */
.event-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.meta-tag {
    background: var(--bg-hover);
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

/* Выделенный тег */
.meta-tag.highlight {
    background: #FFF9E6;
    border-color: #FFE9B2;
    color: #B87C00;
}

/* -------------------------------------------- */
/* Состояния */
/* -------------------------------------------- */
.loading-state, .empty-state, .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 70px 20px;
    text-align: center;
    background: var(--bg-hover);
    border-radius: 20px;
    border: 1px dashed var(--border-light);
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 3px solid var(--border-light);
    border-top: 3px solid var(--accent-blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.empty-state svg, .error-state svg {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
    opacity: 0.4;
}

.empty-state p, .error-state p {
    color: var(--text-secondary);
    font-size: 16px;
}

.error-state button {
    margin-top: 20px;
    padding: 10px 28px;
    background: white;
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
}

.error-state button:hover {
    background: var(--bg-hover);
    border-color: var(--border-hover);
    color: var(--text-primary);
}

/* -------------------------------------------- */
/* Кнопка "Загрузить ещё" - в стиле "Организовать турнир" */
/* -------------------------------------------- */
.feed-footer {
    padding: 24px 28px 28px 28px;
    border-top: 1px solid var(--border-light);
    display: flex;
    justify-content: center;
}

.load-more {
    background: var(--accent-blue);
    border: none;
    color: white;
    padding: 14px 40px;
    border-radius: 40px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 4px 12px rgba(51, 102, 255, 0.3);
}

.load-more:hover {
    background: #2952CC;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(51, 102, 255, 0.4);
}

.load-more:disabled {
    opacity: 0.5;
    pointer-events: none;
    box-shadow: none;
}

/* -------------------------------------------- */
/* Адаптивность */
/* -------------------------------------------- */
@media (max-width: 640px) {
    body {
        padding: 15px;
    }

    .feed-container {
        border-radius: 20px;
    }

    .feed-header {
        padding: 20px;
        flex-direction: column;
        align-items: flex-start;
    }

    .feed-filters {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 5px;
        -webkit-overflow-scrolling: touch;
    }

    .filter-btn {
        flex-shrink: 0;
    }

    .search-box {
        padding: 0 20px 20px 20px;
    }

    .event-card {
        padding: 16px;
        flex-direction: column;
        gap: 12px;
    }

    .event-avatar {
        width: 40px;
        height: 40px;
        font-size: 16px;
    }

    .event-header {
        flex-direction: column;
        align-items: flex-start;
    }

    .event-time::before {
        display: none;
    }

    .feed-content {
        padding: 0 20px 20px 20px;
    }

    .feed-footer {
        padding: 20px;
    }

    .load-more {
        width: 100%;
        text-align: center;
    }
}

/* -------------------------------------------- */
/* Анимация появления */
/* -------------------------------------------- */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(5px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.event-card {
    animation: fadeIn 0.3s ease forwards;
}

/* -------------------------------------------- */
/* Скроллбар */
/* -------------------------------------------- */
.feed-content::-webkit-scrollbar {
    width: 6px;
}

.feed-content::-webkit-scrollbar-track {
    background: var(--bg-hover);
    border-radius: 10px;
}

.feed-content::-webkit-scrollbar-thumb {
    background: var(--border-light);
    border-radius: 10px;
}

.feed-content::-webkit-scrollbar-thumb:hover {
    background: var(--border-hover);
}
    </style>
</head>
<body>
    <div class="feed-container">
        <!-- Шапка -->
        <div class="feed-header">
            <div class="feed-title">
                <h1>Лента активности</h1>
                <div class="live-badge">LIVE</div>
            </div>
            
            <!-- Фильтры -->
            <div class="feed-filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="booking">Бронирования</button>
                <button class="filter-btn" data-filter="achievement">Достижения</button>
                <button class="filter-btn" data-filter="team">Команды</button>
                <button class="filter-btn" data-filter="tournament">Турниры</button>
            </div>
        </div>

        <!-- Поиск -->
        <div class="search-box">
            <input type="text" class="search-input" placeholder="🔍 Поиск по событиям..." id="searchInput">
        </div>

        <!-- Контент ленты -->
        <div class="feed-content" id="feedContent">
            <!-- JS будет вставлять события сюда -->
        </div>

        <!-- Футер с пагинацией -->
        <div class="feed-footer">
            <button class="load-more" id="loadMoreBtn">Загрузить ещё</button>
        </div>
    </div>

    <script>
        // Моковые данные для демонстрации
        const mockEvents = [
            {
                id: 1,
                type: 'booking',
                user: {
                    id: 101,
                    name: 'Анна Петрова',
                    avatar: null,
                    badge: 'PRO-геймер'
                },
                message: 'забронировала <strong>игровую зону A</strong>',
                target: 'Игровая зона A',
                time: '5 минут назад',
                importance: 'normal',
                metadata: {
                    zone: 'Игровая зона A',
                    timeSlot: '18:00-20:00',
                    duration: '2 часа'
                }
            },
            {
                id: 2,
                type: 'achievement',
                user: {
                    id: 102,
                    name: 'Дмитрий Соколов',
                    avatar: null,
                    badge: 'Новичок'
                },
                message: 'получил достижение <strong>«5 бронирований»</strong> 🏆',
                target: '5 бронирований',
                time: '15 минут назад',
                importance: 'achievement',
                metadata: {
                    achievement: '5 бронирований',
                    rarity: 'Редкое',
                    reward: '+50 AP'
                }
            },
            {
                id: 3,
                type: 'team',
                user: {
                    id: 103,
                    name: 'Екатерина Волкова',
                    avatar: null,
                    badge: 'Капитан'
                },
                message: 'создала команду <strong>«CyberPunks»</strong> 👥',
                target: 'CyberPunks',
                time: '1 час назад',
                importance: 'normal',
                metadata: {
                    team: 'CyberPunks',
                    members: 3,
                    slots: 2
                }
            },
            {
                id: 4,
                type: 'tournament',
                user: {
                    id: 104,
                    name: 'Максим Лебедев',
                    avatar: null,
                    badge: 'Чемпион'
                },
                message: 'победил в турнире <strong>«Весенний кубок»</strong> 🎮',
                target: 'Весенний кубок',
                time: '2 часа назад',
                importance: 'high',
                metadata: {
                    tournament: 'Весенний кубок',
                    prize: '2000 AP',
                    place: '1 место'
                }
            },
            {
                id: 5,
                type: 'booking',
                user: {
                    id: 105,
                    name: 'Иван Сидоров',
                    avatar: null,
                    badge: 'Стример'
                },
                message: 'забронировал <strong>тренировочную зону B</strong>',
                target: 'Тренировочная зона B',
                time: '3 часа назад',
                importance: 'normal',
                metadata: {
                    zone: 'Тренировочная зона B',
                    timeSlot: '20:00-22:00',
                    duration: '2 часа'
                }
            },
            {
                id: 6,
                type: 'achievement',
                user: {
                    id: 106,
                    name: 'Ольга Новикова',
                    avatar: null,
                    badge: 'Ветеран'
                },
                message: 'получила достижение <strong>«Первая победа»</strong> ⭐',
                target: 'Первая победа',
                time: '5 часов назад',
                importance: 'achievement',
                metadata: {
                    achievement: 'Первая победа',
                    rarity: 'Обычное',
                    reward: '+30 AP'
                }
            }
        ];

        // Состояние приложения
        let currentFilter = 'all';
        let searchQuery = '';
        let displayedEvents = [...mockEvents];
        let isLoading = false;
        let hasMore = true;

        // DOM элементы
        const feedContent = document.getElementById('feedContent');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');

        // Рендер состояния загрузки
        function renderLoading() {
            feedContent.innerHTML = `
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Загружаем свежие события...</p>
                </div>
            `;
        }

        // Рендер пустого состояния
        function renderEmpty() {
            feedContent.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 12V8H4V12M20 12V18H4V12M20 12H4" stroke="#8892b0" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="12" cy="15" r="1" fill="#8892b0"/>
                        <circle cx="16" cy="15" r="1" fill="#8892b0"/>
                        <circle cx="8" cy="15" r="1" fill="#8892b0"/>
                    </svg>
                    <p>${searchQuery ? 'Ничего не найдено по вашему запросу' : 'Пока нет событий'}</p>
                    ${searchQuery ? '<p>Попробуйте изменить фильтры или поиск</p>' : ''}
                </div>
            `;
        }

        // Рендер ошибки
        function renderError() {
            feedContent.innerHTML = `
                <div class="error-state">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="#ff4655" stroke-width="2"/>
                        <path d="M12 8V12M12 16H12.01" stroke="#ff4655" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <p>Не удалось загрузить события</p>
                    <button onclick="retryLoad()">Попробовать снова</button>
                </div>
            `;
        }

        // Фильтрация событий
        function filterEvents() {
            let filtered = [...mockEvents];

            // Фильтр по типу
            if (currentFilter !== 'all') {
                filtered = filtered.filter(event => event.type === currentFilter);
            }

            // Поиск по тексту
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(event => 
                    event.user.name.toLowerCase().includes(query) ||
                    event.message.toLowerCase().includes(query) ||
                    event.target.toLowerCase().includes(query)
                );
            }

            return filtered;
        }

        // Рендер одной карточки события
        function renderEventCard(event) {
            const avatarContent = event.user.avatar 
                ? `<img src="${event.user.avatar}" alt="${event.user.name}">`
                : event.user.name.charAt(0);

            // Определяем иконку для метаданных
            const getMetaIcon = (type) => {
                switch(type) {
                    case 'booking': return '🕒';
                    case 'achievement': return '🏆';
                    case 'team': return '👥';
                    case 'tournament': return '🎮';
                    default: return '📌';
                }
            };

            // Формируем метаданные
            const metaItems = Object.entries(event.metadata).map(([key, value]) => {
                if (key === 'reward' || key === 'prize') {
                    return `<span class="meta-tag highlight">💰 ${value}</span>`;
                }
                return `<span class="meta-tag">${getMetaIcon(event.type)} ${value}</span>`;
            }).join('');

            return `
                <div class="event-card importance-${event.importance}" data-type="${event.type}" data-id="${event.id}">
                    <div class="event-avatar">
                        ${avatarContent}
                    </div>
                    <div class="event-content">
                        <div class="event-header">
                            <div class="event-user">
                                <span class="username">${event.user.name}</span>
                                ${event.user.badge ? `<span class="badge">${event.user.badge}</span>` : ''}
                            </div>
                            <span class="event-time">${event.time}</span>
                        </div>
                        <div class="event-message">
                            ${event.message}
                        </div>
                        <div class="event-meta">
                            ${metaItems}
                        </div>
                    </div>
                </div>
            `;
        }

        // Рендер ленты
        function renderFeed(reset = true) {
            if (reset) {
                displayedEvents = filterEvents();
            }

            if (isLoading) {
                renderLoading();
                return;
            }

            if (displayedEvents.length === 0) {
                renderEmpty();
                loadMoreBtn.style.display = 'none';
                return;
            }

            // Рендерим события
            feedContent.innerHTML = displayedEvents.map(event => renderEventCard(event)).join('');
            
            // Показываем кнопку "Загрузить ещё" только если есть ещё события
            loadMoreBtn.style.display = displayedEvents.length < mockEvents.length ? 'block' : 'none';
        }

        // Имитация загрузки
        function simulateLoading() {
            isLoading = true;
            renderFeed();
            
            setTimeout(() => {
                isLoading = false;
                renderFeed();
            }, 1500);
        }

        // Обработка ошибки
        function retryLoad() {
            isLoading = true;
            renderFeed();
            
            setTimeout(() => {
                isLoading = false;
                renderFeed();
            }, 1500);
        }

        // Обработчики фильтров
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Обновляем активный класс
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Применяем фильтр
                currentFilter = btn.dataset.filter;
                renderFeed(true);
            });
        });

        // Обработчик поиска с debounce
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = e.target.value;
                renderFeed(true);
            }, 300);
        });

        // Обработчик загрузки ещё
        loadMoreBtn.addEventListener('click', () => {
            // Имитация загрузки дополнительных событий
            const currentCount = displayedEvents.length;
            const moreEvents = mockEvents.slice(currentCount, currentCount + 3);
            
            if (moreEvents.length > 0) {
                displayedEvents = [...displayedEvents, ...moreEvents];
                renderFeed(false);
            }
            
            if (displayedEvents.length >= mockEvents.length) {
                loadMoreBtn.style.display = 'none';
            }
        });

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            simulateLoading();
        });
    </script>
</body>
</html>
