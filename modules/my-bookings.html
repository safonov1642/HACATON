<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои бронирования</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>...</header>
    <main class="container">
        <h1>Мои бронирования</h1>
        <div class="filters">
            <select id="status-filter" class="form-control" style="width: auto;">
                <option value="">Все</option>
                <option value="active">Активные</option>
                <option value="completed">Завершённые</option>
                <option value="cancelled">Отменённые</option>
                <option value="no_show">Неявки</option>
            </select>
        </div>
        <div id="bookings-list">
            <!-- Карточки броней -->
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const filter = document.getElementById('status-filter');
            await loadBookings(filter.value);

            filter.addEventListener('change', () => loadBookings(filter.value));
        });

        async function loadBookings(status) {
            const bookings = await getMyBookings(status);
            const container = document.getElementById('bookings-list');
            container.innerHTML = '';

            if (bookings.length === 0) {
                container.innerHTML = '<p>У вас пока нет бронирований.</p><a href="zones.html" class="btn btn-primary">Перейти к зонам</a>';
                return;
            }

            bookings.forEach(booking => {
                const card = document.createElement('div');
                card.className = 'card';
                const start = new Date(booking.start_time);
                const end = new Date(booking.end_time);
                card.innerHTML = `
                    <h3>Зона: ${booking.zone_id}</h3> <!-- В реальности нужно подставить название зоны, можно доп. запрос -->
                    <p><strong>Начало:</strong> ${start.toLocaleString()}</p>
                    <p><strong>Конец:</strong> ${end.toLocaleString()}</p>
                    <p><strong>Статус:</strong> <span class="badge">${booking.status}</span></p>
                    ${booking.status === 'active' ? '<button class="btn btn-danger btn-cancel" data-id="'+booking.id+'">Отменить</button>' : ''}
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.btn-cancel').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.dataset.id;
                    if (confirm('Отменить бронь?')) {
                        try {
                            await cancelBooking(id);
                            alert('Бронь отменена');
                            loadBookings(filter.value);
                        } catch (err) {
                            alert(err.message);
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
