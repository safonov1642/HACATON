<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание турнира | Киберарена</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">КиберАрена IT.Москва</div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
    </header>

    <main class="create-page">
        <h1>Организация турнира</h1>
        <form id="tournamentForm">
            <div class="form-group">
                <label for="name">Название турнира</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="game">Платформа (игра)</label>
                <select id="game" name="game" required>
                    <option value="">Выберите игру</option>
                    <option value="csgo">CS:GO</option>
                    <option value="dota2">Dota 2</option>
                    <option value="valorant">Valorant</option>
                    <option value="lol">League of Legends</option>
                    <option value="overwatch">Overwatch 2</option>
                    <option value="rainbow6">Rainbow Six Siege</option>
                </select>
            
</div>
            <div class="form-group">
                <label for="date">Дата и время турнира</label>
                <input type="datetime-local" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="description">Описание турнира</label>
                <textarea id="description" name="description" rows="5" placeholder="Расскажите подробнее о турнире..."></textarea>
            </div>

            <button type="submit" class="btn">Создать турнир</button>
        </form>
    </main>

    <script>
        // Предотвращаем отправку формы (демо)
        document.getElementById('tournamentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Турнир создан! (демо-режим)');
        });
    </script>
    <!-- ... (форма создания турнира) ... -->
    
        </main>
    
        <footer class="bottom-bar">
            <div class="footer-content">
                <p>© 2026 Киберарена ГБПОУ ИТ.Москва</p>
                <div class="footer-logo">
                    <img src="images/Group 2131329240.png" alt="Московское образование IT.Москва">
                </div>
            </div>
        </footer>
    
    <script>
        // существующий скрипт
    </script>
</body>
</html>
</html>
