<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание турнира | Киберарена</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Дополнительные стили для компактного расположения полей даты и часа */
        .datetime-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .datetime-group .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        .datetime-group .form-group:first-child {
            flex: 2;
        }
        .hour-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
        }
    </style>
</head>
<body>
        <header>
    <div class="logo">
        <img src="images/ItLogo2.png" alt="Киберарена ИТ.Москва">
    </div>
    
    <button class="burger" id="burgerBtn">
        <i class="fas fa-bars"></i>
    </button>
</header>

    <main class="create-page">
        <h1>Организация турнира</h1>
        <form id="tournamentForm">
            <div class="form-group">
                <label for="name">Название турнира</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="game">Платформа (игра)</label>
                <select id="game" name="game" required>
                    <option value="">Выберите игру</option>
                    <option value="csgo">CS:GO</option>
                    <option value="dota2">Dota 2</option>
                    <option value="valorant">Valorant</option>
                    <option value="lol">League of Legends</option>
                    <option value="overwatch">Overwatch 2</option>
                    <option value="rainbow6">Rainbow Six Siege</option>
                </select>
            </div>

            <!-- Блок выбора даты и часа (минуты всегда 00) -->
            <div class="datetime-group">
                <div class="form-group">
                    <label for="tournamentDate">Дата турнира</label>
                    <input type="date" id="tournamentDate" name="date" required>
                </div>
                <div class="form-group">
                    <label for="tournamentHour">Час</label>
                    <select id="tournamentHour" class="hour-select" required>
                        <option value="">Выберите час</option>
                        <!-- Генерируем опции от 0 до 23 -->
                        <script>
                            for (let h = 0; h < 24; h++) {
                                let hourStr = h.toString().padStart(2, '0');
                                document.write(`<option value="${h}">${hourStr}:00</option>`);
                            }
                        </script>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Описание турнира</label>
                <textarea id="description" name="description" rows="5" placeholder="Расскажите подробнее о турнире..."></textarea>
            </div>

            <button type="submit" class="btn">Создать турнир</button>
        </form>
    </main>

    <script>
        document.getElementById('tournamentForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const game = document.getElementById('game').value;
            const date = document.getElementById('tournamentDate').value;
            const hour = document.getElementById('tournamentHour').value;
            const description = document.getElementById('description').value;

            if (!date || !hour) {
                alert('Пожалуйста, выберите дату и час турнира.');
                return;
            }

            // Формируем строку даты и времени в локальном формате для отображения
            const selectedDate = new Date(date);
            const day = selectedDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            const hourPadded = hour.padStart(2, '0');
            const dateTimeStr = `${day} в ${hourPadded}:00`;

            // Для реальной отправки на сервер можно создать ISO-строку, например:
            // const isoString = `${date}T${hourPadded}:00:00`;

            alert(`Турнир "${name}" создан!\nИгра: ${game}\nДата и время: ${dateTimeStr}\nОписание: ${description || 'не указано'}`);
        });
    </script>
</body>
</html>
